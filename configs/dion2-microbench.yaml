
# — Model —
model_dim: 5120
n_layer: 20
n_head: 40
use_bias: false
sequence_length: 1024

# — Batching & Training —
batch_size: 64
device_batch_size: 8
num_iterations: 100

# — Learning‐rate schedule —
warmup_ratio: 0.0
warmdown_ratio: 0.2

# — Validation & Checkpointing —
val_loss_every: 125
val_tokens: 32768 

# — Distributed training —
fs_size: null      # FSDP size 

# — Optimizer & Hyperparameters —
optimizer: dion2
scalar_opt: adamw
mu: 0.95
weight_decay: 0.01
ortho_fraction: 1.0
adjust_lr: spectral_norm
lr: 0.02
use_polar_express: true
use_gns_package: false
use_gns_alg: false
split_heads: false
time_optimizer: false
