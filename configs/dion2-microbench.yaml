
# — Model —
model_dim: 16384
n_layer: 4
n_head: 16
sequence_length: 1024

# — Batching & Training —
batch_size: 8
device_batch_size: 2
num_iterations: 40

# — Learning‐rate schedule —
warmup_ratio: 0.0
warmdown_ratio: 0.2

# — Validation & Checkpointing —
val_loss_every: 125
val_tokens: 32768 

# — Distributed training —
fs_size: null      # FSDP size 

# — Optimizer & Hyperparameters —
optimizer: dion2
scalar_opt: adamw
mu: 0.95
weight_decay: 0.01
ortho_fraction: 1.0
adjust_lr: spectral_norm
lr: 0.02
