# Config for benchmarking OLMoE-1B-7B style MoE with SwiGLU
# Based on allenai/OLMoE-1B-7B-0924 architecture

# — Model —
model_dim: 2048
n_layer: 16
n_head: 16
use_bias: false
sequence_length: 4096
vocab_size: 50304

# — MoE Config —
use_moe: true
num_experts: 64
num_experts_per_tok: 8
moe_activation: swiglu
moe_intermediate_size: 1024

# — Optimizer —
optimizer: dion2
scalar_opt: adamw
lr: 0.02
mu: 0.95
weight_decay: 0.01
ortho_fraction: 1.0
adjust_lr: spectral_norm

# — Distributed —
fs_size: null
